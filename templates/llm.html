<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>b0bot | LLM Configuration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><a class="navbar-brand" href="/">← Back to Dashboard</a></div>
    </nav>

    <div class="container">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title">Model Settings</h2>
                <p class="text-muted">Select the LLM core for the Agentic Loop.</p>
                <form action="/update-llm" method="POST">
                    <select name="model_choice" class="form-select form-select-lg mb-3">
                        <option value="mistral-large-latest">Mistral Large (Default)</option>
                        <option value="gpt-4o">OpenAI GPT-4o</option>
                        <option value="llama3-70b">Meta Llama 3 (Groq)</option>
                    </select>
                    <button type="submit" class="btn btn-success">Save Configuration</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
